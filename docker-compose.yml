services:
  db:
    image: postgres:16-alpine
    container_name: forum_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-forum_db}
      POSTGRES_USER: ${DATABASE_USER:-forum_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-forum_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-forum_user} -d ${DATABASE_NAME:-forum_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forum_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DATABASE_USER:-forum_user}:${DATABASE_PASSWORD:-forum_password}@db:5432/${DATABASE_NAME:-forum_db}
      DATABASE_HOST: db
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn fastapi_app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: forum_frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

  frontend_dev:
    image: node:22-alpine
    container_name: forum_frontend_dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    profiles:
      - dev

volumes:
  postgres_data:
