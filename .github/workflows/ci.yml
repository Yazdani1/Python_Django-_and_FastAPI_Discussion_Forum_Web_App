name: CI

on:
  push:
  pull_request:
    branches: [main]

env:
  APP_ENV: testing
  APP_SECRET_KEY: ci-secret-key-not-for-production
  DATABASE_URL: postgresql+asyncpg://forum_user:forum_password@localhost:5432/forum_db
  DATABASE_HOST: localhost
  DATABASE_PORT: 5432
  DATABASE_NAME: forum_db
  DATABASE_USER: forum_user
  DATABASE_PASSWORD: forum_password
  JWT_SECRET_KEY: ci-jwt-secret-key-not-for-production
  JWT_ALGORITHM: HS256
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 15
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
  CORS_ALLOWED_ORIGINS: '["http://localhost:5173"]'

jobs:
  # ── Job 1: Backend lint + unit tests (no database needed) ──────────────────
  backend:
    name: Backend — Lint & Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check fastapi_app/

      - name: Check formatting with ruff
        run: ruff format --check fastapi_app/

      - name: Run tests
        run: python -m pytest fastapi_app/tests/ -v --tb=short --cov=fastapi_app --cov-report=term-missing

  # ── Job 2: API tests against a real PostgreSQL database ────────────────────
  api-tests:
    name: Backend — API Tests (PostgreSQL)
    runs-on: ubuntu-latest
    needs: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: forum_db
          POSTGRES_USER: forum_user
          POSTGRES_PASSWORD: forum_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        run: python -m alembic upgrade head

      - name: Run auth API tests
        run: python -m pytest fastapi_app/tests/test_auth.py -v --tb=short

      - name: Run users API tests
        run: python -m pytest fastapi_app/tests/test_users.py -v --tb=short

      - name: Run posts API tests
        run: python -m pytest fastapi_app/tests/test_posts.py -v --tb=short

      - name: Run health API tests
        run: python -m pytest fastapi_app/tests/test_health.py -v --tb=short

  # ── Job 3: Frontend type check, tests, and production build ────────────────
  frontend:
    name: Frontend — Type Check, Tests & Build
    runs-on: ubuntu-latest
    needs: api-tests

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npm run type-check

      - name: Run tests
        run: npm run test

      - name: Production build
        run: npm run build
