name: Backend CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      APP_ENV: testing
      APP_SECRET_KEY: ci-secret-key-not-for-production
      DATABASE_URL: postgresql+asyncpg://forum_user:forum_password@localhost:5432/forum_db
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: forum_db
      DATABASE_USER: forum_user
      DATABASE_PASSWORD: forum_password
      JWT_SECRET_KEY: ci-jwt-secret-key-not-for-production
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 15
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ALLOWED_ORIGINS: '["http://localhost:5173"]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check fastapi_app/

      - name: Check formatting with ruff
        run: ruff format --check fastapi_app/

      - name: Run tests
        run: python -m pytest fastapi_app/tests/ -v --tb=short --cov=fastapi_app --cov-report=term-missing
