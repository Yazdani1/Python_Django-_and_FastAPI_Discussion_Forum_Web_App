name: Backend API Tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Tests (Real PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: forum_db
          POSTGRES_USER: forum_user
          POSTGRES_PASSWORD: forum_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: backend

    env:
      APP_ENV: testing
      APP_SECRET_KEY: ci-secret-key-not-for-production
      DATABASE_URL: postgresql+asyncpg://forum_user:forum_password@localhost:5432/forum_db
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: forum_db
      DATABASE_USER: forum_user
      DATABASE_PASSWORD: forum_password
      JWT_SECRET_KEY: ci-jwt-secret-key-not-for-production
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 15
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ALLOWED_ORIGINS: '["http://localhost:5173"]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        run: python -m alembic upgrade head

      - name: Run auth API tests
        run: python -m pytest fastapi_app/tests/test_auth.py -v --tb=short

      - name: Run users API tests
        run: python -m pytest fastapi_app/tests/test_users.py -v --tb=short

      - name: Run posts API tests
        run: python -m pytest fastapi_app/tests/test_posts.py -v --tb=short

      - name: Run health API tests
        run: python -m pytest fastapi_app/tests/test_health.py -v --tb=short
